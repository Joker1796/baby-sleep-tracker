# Смоук-тест: онбординг → трекинг сна → вкладки.
# Запуск: собранное приложение на симуляторе + `npm run e2e`.
# clearState: каждый прогон начинается с чистой БД (как первый запуск).
appId: com.anonymous.reginaapp
---
- launchApp:
    clearState: true

# ── Онбординг: создание профиля ребёнка ──
- assertVisible: 'Режим малыша'
- tapOn: 'Например, Миша'
- inputText: 'Тест'
- hideKeyboard
- scrollUntilVisible:
    element:
      text: 'Добавить'
    direction: DOWN
- tapOn: 'Добавить'

# ── Главный экран: нет данных о сне ──
- assertVisible: 'Нет данных о сне'

# ── Трекинг сна: уснул → спит → проснулся → бодрствует ──
# Кнопки с иконками «сплющены» в один a11y-узел ("<иконка>, Уснул(а)"),
# а вкладки читаются как "История, tab, 2 of 5" — поэтому матчим по подстроке.
- tapOn: '.*Уснул.*'
- assertVisible: 'Спит.*'
- tapOn: '.*Проснул.*'
# Днём после пробуждения — «Бодрствует N мин», ночью — «Ночное пробуждение».
- assertVisible: 'Бодрствует.*|Ночное пробуждение'

# ── Вкладки ──
- tapOn: '.*История.*'
- assertVisible: 'Сводка за день'
- assertVisible: 'Всего сна'
- tapOn: '.*Календарь.*'
- assertVisible: '.*Добавить.*'
- tapOn: '.*Настройки.*'
# Карточки «Тема» и «Данные» ниже длинной формы профиля — скроллим.
- scrollUntilVisible:
    element:
      text: 'Тема'
    direction: DOWN
- scrollUntilVisible:
    element:
      text: '.*Экспорт.*'
    direction: DOWN
